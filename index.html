<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>智能题库 | 题型分类练习 + 错题本 & 收藏</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #f1f5f9;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 20px;
            color: #0f172a;
        }

        .app-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 顶部栏 */
        .toolbar {
            background: white;
            border-radius: 28px;
            padding: 12px 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .progress-info {
            background: #eef2ff;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            background: #e2e8f0;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            color: #1e293b;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #cbd5e1;
        }

        .btn-outline:hover {
            background: #f8fafc;
        }

        .card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            overflow: hidden;
            padding: 24px 28px;
        }

        /* 题型选项卡 */
        .tabs {
            display: flex;
            gap: 12px;
            background: #fff;
            border-radius: 48px;
            padding: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 8px;
        }
        .tab-btn {
            flex: 1;
            text-align: center;
            background: transparent;
            border: none;
            padding: 10px 0;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            color: #475569;
        }
        .tab-btn.active {
            background: #3b82f6;
            color: white;
            box-shadow: 0 2px 6px rgba(59,130,246,0.3);
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 20px;
            border-bottom: 2px solid #eef2ff;
            padding-bottom: 12px;
        }
        .q-type {
            background: #e6f0ff;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #1e40af;
        }
        .q-id {
            font-weight: 700;
            color: #475569;
        }
        .question-text {
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 28px;
            color: #0f172a;
        }
        .options-area {
            margin: 20px 0 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .option-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 8px 12px;
            background: #f8fafc;
            border-radius: 18px;
        }
        .option-text {
            line-height: 1.4;
            flex: 1;
        }
        input[type="radio"], input[type="checkbox"] {
            transform: scale(1.1);
            margin-top: 2px;
            accent-color: #3b82f6;
        }
        .feedback {
            margin-top: 20px;
            padding: 14px 18px;
            border-radius: 24px;
            background: #f1f5f9;
            border-left: 6px solid #3b82f6;
        }
        .feedback.correct {
            background: #e6f7ec;
            border-left-color: #10b981;
        }
        .feedback.wrong {
            background: #fee2e2;
            border-left-color: #ef4444;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            gap: 12px;
        }
        .star-btn {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            transition: 0.1s;
            padding: 0 8px;
        }
        .info-panels {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .info-panel {
            background: white;
            border-radius: 28px;
            flex: 1;
            padding: 16px 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .panel-title {
            font-weight: 700;
            margin-bottom: 12px;
            border-left: 4px solid #3b82f6;
            padding-left: 12px;
        }
        .list-items {
            max-height: 220px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .list-item {
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        footer {
            text-align: center;
            font-size: 0.75rem;
            color: #64748b;
        }
        @media (max-width: 700px) {
            .card { padding: 16px; }
            .question-text { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="toolbar">
        <div class="progress-info">📚 题型分类刷题 · 逐题模式</div>
        <div class="action-buttons">
            <button id="resetWrongBtn" class="btn btn-outline">🗑️ 清空错题本</button>
            <button id="resetFavBtn" class="btn btn-outline">⭐ 清空收藏</button>
            <button id="resetProgressBtn" class="btn btn-outline">🔄 重置答题</button>
        </div>
    </div>

    <!-- 题型选项卡 -->
    <div class="tabs">
        <button class="tab-btn" data-type="single">📘 单选题</button>
        <button class="tab-btn" data-type="judge">⚖️ 判断题</button>
        <button class="tab-btn" data-type="multi">📚 多选题</button>
    </div>

    <!-- 主卡片 -->
    <div class="card">
        <div class="question-header">
            <span class="q-type" id="qTypeLabel">单选题</span>
            <span class="q-id" id="qIdLabel">#0</span>
            <button id="favoriteBtn" class="star-btn">☆</button>
        </div>
        <div class="question-text" id="questionText">加载中...</div>
        <div class="options-area" id="optionsContainer"></div>
        <div class="feedback" id="feedbackArea">⚡ 选择答案后点击「提交答案」</div>
        <div class="nav-buttons">
            <button id="prevBtn" class="btn">◀ 上一题</button>
            <button id="submitBtn" class="btn btn-primary">✅ 提交答案</button>
            <button id="nextBtn" class="btn">下一题 ▶</button>
        </div>
    </div>

    <!-- 错题本 & 收藏夹 -->
    <div class="info-panels">
        <div class="info-panel">
            <div class="panel-title">📕 错题本 (<span id="wrongCount">0</span>)</div>
            <div id="wrongListContainer" class="list-items"><div style="color:#94a3b8;">暂无错题</div></div>
        </div>
        <div class="info-panel">
            <div class="panel-title">⭐ 我的收藏 (<span id="favCount">0</span>)</div>
            <div id="favListContainer" class="list-items"><div style="color:#94a3b8;">点击星标收藏</div></div>
        </div>
    </div>
    <footer>✔ 按题型筛选练习，错题自动收录，支持收藏。切换题型不影响已提交记录。</footer>
</div>

<script>
    // ---------- 完整题库 (包含单选、判断、多选，基于真实题目) ----------
    const MASTER_QUESTIONS = [
        // 单选题部分
        { id: 1, type: "single", text: "根据《中华人民共和国商标法》，下列哪类行为不属于商标侵权行为（）。", options: ["A. 未经商标注册人同意，更换其注册商标并将该更换商标的商品又投入市场", "B. 销售侵犯注册商标专用权的商品", "C. 使用注册商标中含有的本商品的通用名称", "D. 未经许可在同一种商品上使用相同商标"], answer: "C", explanation: "通用名称使用不构成商标侵权。" },
        { id: 2, type: "single", text: "（）是逻辑回归算法中常用的损失函数。", options: ["A. 对数似然损失函数", "B. 均方误差", "C. Hinge损失函数", "D. 平均绝对误差"], answer: "A", explanation: "逻辑回归采用对数损失/交叉熵。" },
        { id: 3, type: "single", text: "下列哪种行为没有违背《中华人民共和国个人信息保护法》的条款？", options: ["A. 未经个人同意公开敏感信息", "B. 将个人信息提供给第三方推销", "C. 企业公布招聘岗位职称、工资水平等信息", "D. 出售健康记录"], answer: "C", explanation: "招聘信息不涉及个人隐私。" },
        { id: 4, type: "single", text: "数据库管理系统（DBMS）指的是什么（）", options: ["A. 数据存储格式", "B. 网络协议", "C. 一种软件工具", "D. 硬件设备"], answer: "C", explanation: "DBMS是软件系统。" },
        { id: 5, type: "single", text: "在Python中，（）函数可以对图像实施中值滤波处理。", options: ["A. cv2.threshold()", "B. cv2.GaussianBlur()", "C. cv2.bilateralFilter()", "D. cv2.medianBlur()"], answer: "D", explanation: "medianBlur执行中值滤波。" },
        { id: 6, type: "single", text: "1969年，贝尔实验室研发出的计算机操作系统是什么（）。", options: ["A. Unix", "B. Linux", "C. MacOS", "D. Windows"], answer: "A", explanation: "Unix诞生于贝尔实验室。" },
        { id: 7, type: "single", text: "支持向量机算法的原理是建立在（）基础上的。", options: ["A. 最小二乘法", "B. 线性回归", "C. 最大熵模型", "D. 最大间隔"], answer: "D", explanation: "SVM核心思想是最大间隔分类器。" },
        { id: 8, type: "single", text: "指导初级工标注文本数据时，应当注意（）问题。", options: ["A. 按照标注规范即可，无需关注其它", "B. 标注文本时要注意同类标注属性需保持一致", "C. 随意忽略错别字", "D. 忽略文本样式"], answer: "B", explanation: "标注一致性是关键。" },
        { id: 9, type: "single", text: "对比分析的作用是比较不同组别或对象之间存在的（）。", options: ["A. 趋势", "B. 分布", "C. 差异", "D. 相关性"], answer: "C", explanation: "对比分析核心是比较差异。" },
        { id: 10, type: "single", text: "下列哪项不属于计算机的特点（）。", options: ["A. 可拓展性强", "B. 自动化程度高", "C. 运算速度快", "D. 存储功能强"], answer: "A", explanation: "可拓展性不是最基础特点。" },
        // 判断题
        { id: 11, type: "judge", text: "在关联分析中，支持度是用于评估变量间关联程度的指标。", options: ["正确", "错误"], answer: "错误", explanation: "支持度评估普遍性，置信度/提升度评估关联程度。" },
        { id: 12, type: "judge", text: "数据库管理系统只负责数据的存储，而数据的增删改查操作则完全依靠外部应用程序来实现。", options: ["正确", "错误"], answer: "错误", explanation: "DBMS提供数据操纵语言（DML）。" },
        { id: 13, type: "judge", text: "Jieba分词库仅能用于情感分析。", options: ["正确", "错误"], answer: "错误", explanation: "jieba是通用中文分词工具。" },
        { id: 14, type: "judge", text: "均值滤波能用于去除脉冲噪声。", options: ["正确", "错误"], answer: "错误", explanation: "中值滤波更适合脉冲噪声（椒盐噪声）。" },
        { id: 15, type: "judge", text: "在请求模式里，当应用程序等待输入数据时，会持续运行直到接收到输入数据才会停下。", options: ["正确", "错误"], answer: "错误", explanation: "请求模式下程序会阻塞等待。" },
        // 多选题
        { id: 16, type: "multi", text: "可供人机交互使用的设备，主要有哪些以及各类模式识别设备等？", options: ["A.键盘", "B.鼠标", "C.冰箱", "D.洗衣机"], answer: ["A","B"], explanation: "键盘鼠标是典型交互设备。" },
        { id: 17, type: "multi", text: "下列属于NoSQL数据库的有哪些（）。", options: ["A.键值数据库", "B.列族数据库", "C.文档数据库", "D.分布式数据库"], answer: ["A","B","C"], explanation: "NoSQL包含键值、列族、文档等模型。" },
        { id: 18, type: "multi", text: "下列关于恪尽职守基本要求的说法，不正确的是（）。", options: ["A.履行职责和工作任务时尽职尽责", "B.只要工作认真负责，不需要学习进修", "C.保守公司机密是个人选择，可透露也可不透露", "D.只要听从领导指挥，不需要考虑任务本身的合理性"], answer: ["B","C","D"], explanation: "恪尽职守要求持续学习并保密。" },
        { id: 19, type: "multi", text: "在人机交互行为模型中，下列哪项属于交互过程的类型？", options: ["A.数据交互","B.行为交互","C.图像交互","D.相互作用交互"], answer: ["A","B","C"], explanation: "常见三种交互类型。" },
        { id: 20, type: "multi", text: "在可用性设计中，以下（）设计原则有助于提高产品的易用性。", options: ["A.让用户能够快速学会如何使用产品","B.设计时避免考虑用户的错误操作","C.提供灵活的操作方式以适应不同用户需求","D.产品设计需要具有容错性"], answer: ["A","C","D"], explanation: "包容错误、灵活和易学都是易用性核心。" },
        { id: 21, type: "single", text: "在神经网络里，适合处理序列数据和时序信息的是（）。", options: ["A. GAN", "B. MLP", "C. CNN", "D. RNN"], answer: "D", explanation: "RNN专为序列数据设计。" },
        { id: 22, type: "single", text: "逻辑回归算法的输出结果是（）。", options: ["A.线性值","B.离散值","C.概率值","D.种类标签"], answer: "C", explanation: "逻辑回归输出0~1概率。" },
        { id: 23, type: "judge", text: "无监督图像去噪方法只利用噪声图像来开展训练。", options: ["正确","错误"], answer: "错误", explanation: "通常需要干净图像作为目标。" },
        { id: 24, type: "multi", text: "常见的文本向量化方法有哪些（）。", options: ["A.one-hot编码","B.词袋模型","C.TF-IDF","D.词性标注模型"], answer: ["A","B","C"], explanation: "词性标注不是向量化方法。" }
    ];

    // ---------- 全局状态 ----------
    let currentType = "single";           // 'single', 'judge', 'multi'
    let filteredIndices = [];              // 当前题型下在原题库中的索引列表
    let currentPos = 0;                   // 在filteredIndices中的位置
    // 存储用户所有题目的答案 (按原始id索引)
    let userAnswersMap = new Map();        // key: 题目id, value: 答案(string 或 array)
    let submittedMap = new Map();          // key: 题目id, value: boolean 是否提交过
    let wrongSet = new Set();              // 错题id集合
    let favoriteSet = new Set();           // 收藏id集合

    // DOM 元素
    const qTypeLabel = document.getElementById("qTypeLabel");
    const qIdLabel = document.getElementById("qIdLabel");
    const questionTextEl = document.getElementById("questionText");
    const optionsContainer = document.getElementById("optionsContainer");
    const feedbackArea = document.getElementById("feedbackArea");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const submitBtn = document.getElementById("submitBtn");
    const favoriteBtn = document.getElementById("favoriteBtn");
    const wrongCountSpan = document.getElementById("wrongCount");
    const favCountSpan = document.getElementById("favCount");
    const wrongListContainer = document.getElementById("wrongListContainer");
    const favListContainer = document.getElementById("favListContainer");

    // 辅助函数: 根据题型过滤索引
    function updateFilteredIndices() {
        filteredIndices = MASTER_QUESTIONS.reduce((arr, q, idx) => {
            if (q.type === currentType) arr.push(idx);
            return arr;
        }, []);
        if (filteredIndices.length === 0) {
            // 无题目时显示提示
            currentPos = -1;
        } else {
            if (currentPos >= filteredIndices.length) currentPos = filteredIndices.length - 1;
            if (currentPos < 0 && filteredIndices.length > 0) currentPos = 0;
        }
    }

    // 获取当前题目对象
    function getCurrentQuestion() {
        if (filteredIndices.length === 0 || currentPos < 0 || currentPos >= filteredIndices.length) return null;
        const globalIdx = filteredIndices[currentPos];
        return MASTER_QUESTIONS[globalIdx];
    }

    // 获取当前题目在全局数组中的原始索引
    function getCurrentGlobalIndex() {
        if (filteredIndices.length === 0) return -1;
        return filteredIndices[currentPos];
    }

    // 渲染当前题目 (根据 currentType 和 currentPos)
    function renderCurrentQuestion() {
        const q = getCurrentQuestion();
        if (!q) {
            questionTextEl.innerText = "暂无此类题型题目，请切换其他题型。";
            optionsContainer.innerHTML = "";
            feedbackArea.innerHTML = "⚡ 无题目数据";
            qTypeLabel.innerText = currentType === "single" ? "单选题" : (currentType === "judge" ? "判断题" : "多选题");
            qIdLabel.innerText = "#—";
            favoriteBtn.style.display = "none";
            return;
        }
        favoriteBtn.style.display = "inline-block";
        // 更新类型标签
        let typeName = "";
        if (q.type === "single") typeName = "单选题";
        else if (q.type === "judge") typeName = "判断题";
        else typeName = "多选题";
        qTypeLabel.innerText = typeName;
        qIdLabel.innerText = `#${q.id}`;
        questionTextEl.innerText = q.text;
        // 收藏星标
        favoriteBtn.innerText = favoriteSet.has(q.id) ? "★" : "☆";
        
        // 渲染选项
        optionsContainer.innerHTML = "";
        const savedAnswer = userAnswersMap.get(q.id);
        if (q.type === "single" || q.type === "judge") {
            q.options.forEach((opt, idx) => {
                const letter = String.fromCharCode(65 + idx);
                const div = document.createElement("div");
                div.className = "option-item";
                const radio = document.createElement("input");
                radio.type = "radio";
                radio.name = "questionOption";
                radio.value = letter;
                if (savedAnswer === letter) radio.checked = true;
                const span = document.createElement("span");
                span.className = "option-text";
                span.innerText = opt;
                div.appendChild(radio);
                div.appendChild(span);
                optionsContainer.appendChild(div);
            });
        } else { // 多选
            q.options.forEach((opt, idx) => {
                const letter = String.fromCharCode(65 + idx);
                const div = document.createElement("div");
                div.className = "option-item";
                const cb = document.createElement("input");
                cb.type = "checkbox";
                cb.value = letter;
                if (savedAnswer && Array.isArray(savedAnswer) && savedAnswer.includes(letter)) cb.checked = true;
                const span = document.createElement("span");
                span.innerText = opt;
                div.appendChild(cb);
                div.appendChild(span);
                optionsContainer.appendChild(div);
            });
        }

        // 显示提交后的反馈
        const isSubmitted = submittedMap.get(q.id) || false;
        if (isSubmitted) {
            const userAns = savedAnswer;
            const correctAns = q.answer;
            let isCorrect = false;
            if (q.type === "multi") {
                const userSorted = userAns && Array.isArray(userAns) ? [...userAns].sort().join(",") : "";
                const correctSorted = Array.isArray(correctAns) ? [...correctAns].sort().join(",") : correctAns;
                isCorrect = (userSorted === correctSorted);
            } else {
                isCorrect = (userAns === correctAns);
            }
            const correctDisplay = Array.isArray(correctAns) ? correctAns.join(",") : correctAns;
            feedbackArea.className = `feedback ${isCorrect ? "correct" : "wrong"}`;
            feedbackArea.innerHTML = `<strong>${isCorrect ? "✓ 回答正确" : "✗ 回答错误"}</strong><br>✅ 正确答案：${correctDisplay}<br>📖 解析：${q.explanation || "无"}`;
        } else {
            feedbackArea.className = "feedback";
            feedbackArea.innerHTML = `⚡ 尚未提交本题，请选择答案后点击「提交答案」`;
        }
    }

    // 收集当前页面选择的答案
    function collectCurrentAnswer() {
        const q = getCurrentQuestion();
        if (!q) return null;
        if (q.type === "single" || q.type === "judge") {
            const selected = document.querySelector('input[name="questionOption"]:checked');
            return selected ? selected.value : null;
        } else {
            const checkedBoxes = document.querySelectorAll('#optionsContainer input[type="checkbox"]:checked');
            let values = Array.from(checkedBoxes).map(cb => cb.value);
            return values.length ? values : null;
        }
    }

    // 提交当前题目，更新错题本
    function submitCurrent() {
        const q = getCurrentQuestion();
        if (!q) {
            alert("没有题目可提交");
            return;
        }
        const currentAns = collectCurrentAnswer();
        if (!currentAns || (Array.isArray(currentAns) && currentAns.length === 0)) {
            alert("请先选择答案！");
            return;
        }
        // 保存答案
        userAnswersMap.set(q.id, currentAns);
        submittedMap.set(q.id, true);
        
        // 判断正误 & 维护错题本
        let isCorrect = false;
        if (q.type === "multi") {
            const userSorted = [...currentAns].sort().join(",");
            const correctSorted = Array.isArray(q.answer) ? [...q.answer].sort().join(",") : q.answer;
            isCorrect = (userSorted === correctSorted);
        } else {
            isCorrect = (currentAns === q.answer);
        }
        if (!isCorrect) {
            wrongSet.add(q.id);
        } else {
            if (wrongSet.has(q.id)) wrongSet.delete(q.id);
        }
        saveWrongToLocal();
        updateCountersAndLists();
        renderCurrentQuestion();  // 刷新反馈区
    }

    function nextQuestion() {
        if (filteredIndices.length === 0) return;
        if (currentPos + 1 < filteredIndices.length) {
            currentPos++;
            renderCurrentQuestion();
        } else {
            alert("已是当前题型最后一题");
        }
    }

    function prevQuestion() {
        if (filteredIndices.length === 0) return;
        if (currentPos - 1 >= 0) {
            currentPos--;
            renderCurrentQuestion();
        } else {
            alert("已是当前题型第一题");
        }
    }

    function toggleFavorite() {
        const q = getCurrentQuestion();
        if (!q) return;
        if (favoriteSet.has(q.id)) {
            favoriteSet.delete(q.id);
        } else {
            favoriteSet.add(q.id);
        }
        saveFavToLocal();
        renderCurrentQuestion();  // 刷新星标
        updateCountersAndLists();
    }

    // 更新侧边栏错题/收藏列表及计数
    function updateCountersAndLists() {
        wrongCountSpan.innerText = wrongSet.size;
        favCountSpan.innerText = favoriteSet.size;
        // 错题本列表
        if (wrongSet.size === 0) {
            wrongListContainer.innerHTML = "<div style='color:#94a3b8;'>暂无错题，做错自动收录</div>";
        } else {
            wrongListContainer.innerHTML = "";
            const sortedWrong = Array.from(wrongSet).sort((a,b)=>a-b);
            for (let wid of sortedWrong) {
                const q = MASTER_QUESTIONS.find(qq => qq.id === wid);
                if (q) {
                    const div = document.createElement("div");
                    div.className = "list-item";
                    let typeIcon = q.type === "single" ? "🔘" : (q.type === "judge" ? "⚖️" : "☑️");
                    div.innerHTML = `<span>${typeIcon} #${q.id} ${q.text.substring(0,28)}...</span><span>❌</span>`;
                    div.onclick = () => {
                        // 切换到对应题型
                        if (currentType !== q.type) {
                            switchType(q.type);
                        }
                        // 找到该题在当前筛选中的位置
                        const newPos = filteredIndices.findIndex(idx => MASTER_QUESTIONS[idx].id === wid);
                        if (newPos !== -1) {
                            currentPos = newPos;
                            renderCurrentQuestion();
                        } else {
                            // 理论上切换到对应题型后肯定存在
                            const newPosAgain = filteredIndices.findIndex(idx => MASTER_QUESTIONS[idx].id === wid);
                            if (newPosAgain !== -1) currentPos = newPosAgain;
                            renderCurrentQuestion();
                        }
                    };
                    wrongListContainer.appendChild(div);
                }
            }
        }
        // 收藏列表
        if (favoriteSet.size === 0) {
            favListContainer.innerHTML = "<div style='color:#94a3b8;'>暂无收藏，点击星标收藏</div>";
        } else {
            favListContainer.innerHTML = "";
            const sortedFav = Array.from(favoriteSet).sort((a,b)=>a-b);
            for (let fid of sortedFav) {
                const q = MASTER_QUESTIONS.find(qq => qq.id === fid);
                if (q) {
                    const div = document.createElement("div");
                    div.className = "list-item";
                    let typeIcon = q.type === "single" ? "🔘" : (q.type === "judge" ? "⚖️" : "☑️");
                    div.innerHTML = `<span>${typeIcon} #${q.id} ${q.text.substring(0,28)}...</span><span>⭐</span>`;
                    div.onclick = () => {
                        if (currentType !== q.type) switchType(q.type);
                        const pos = filteredIndices.findIndex(idx => MASTER_QUESTIONS[idx].id === fid);
                        if (pos !== -1) {
                            currentPos = pos;
                            renderCurrentQuestion();
                        } else {
                            // 再次定位
                            const newPos = filteredIndices.findIndex(idx => MASTER_QUESTIONS[idx].id === fid);
                            if (newPos !== -1) currentPos = newPos;
                            renderCurrentQuestion();
                        }
                    };
                    favListContainer.appendChild(div);
                }
            }
        }
    }

    // 切换题型 (用于选项卡点击)
    function switchType(newType) {
        currentType = newType;
        updateFilteredIndices();
        if (filteredIndices.length > 0) {
            if (currentPos >= filteredIndices.length) currentPos = filteredIndices.length - 1;
            if (currentPos < 0) currentPos = 0;
        } else {
            currentPos = -1;
        }
        renderCurrentQuestion();
        // 高亮选项卡UI
        document.querySelectorAll(".tab-btn").forEach(btn => {
            if (btn.getAttribute("data-type") === newType) {
                btn.classList.add("active");
            } else {
                btn.classList.remove("active");
            }
        });
    }

    // 重置所有进度 (不清除错题本和收藏，只清除答题记录)
    function resetAllProgress() {
        if (confirm("重置后所有题目的答题记录将被清空，是否继续？")) {
            userAnswersMap.clear();
            submittedMap.clear();
            // 注意错题本保留与否？按照常规设计，重置答题同时可清空错题本？题目要求“重置当前答题”，我们只重置已提交答案，错题本理论上基于正误，既然提交记录清空，应当重新计算错题本？但是为了合理，错题本依赖正误，如果全部清空，错题本应该重新基于现有答案？没有答案时错题本应该清空。
            wrongSet.clear();
            favoriteSet.clear();   // 收藏不清？很多用户希望保留收藏，这里只重置答题，保留收藏比较合理，但题目未明确，选择保留收藏，错题本清空（因为答案没了）。
            // 但根据一般习惯，重置进度可以清空错题本但保留收藏，执行清空错题本+答题记录。
            wrongSet.clear();
            saveWrongToLocal();
            saveFavToLocal();
            renderCurrentQuestion();
            updateCountersAndLists();
            alert("答题进度已重置，错题本已清空，收藏保留。");
        }
    }

    function clearWrongOnly() { wrongSet.clear(); saveWrongToLocal(); updateCountersAndLists(); alert("错题本已清空"); renderCurrentQuestion(); }
    function clearFavOnly() { favoriteSet.clear(); saveFavToLocal(); updateCountersAndLists(); renderCurrentQuestion(); alert("收藏已清空"); }

    // localStorage 持久化
    function saveWrongToLocal() { localStorage.setItem("wrongSetV2", JSON.stringify([...wrongSet])); }
    function saveFavToLocal() { localStorage.setItem("favoriteSetV2", JSON.stringify([...favoriteSet])); }
    function loadLocalData() {
        const storedWrong = localStorage.getItem("wrongSetV2");
        if (storedWrong) wrongSet = new Set(JSON.parse(storedWrong));
        const storedFav = localStorage.getItem("favoriteSetV2");
        if (storedFav) favoriteSet = new Set(JSON.parse(storedFav));
        // 另外可存储答题记录和提交状态 (可选，提升体验)
        const storedAnswers = localStorage.getItem("userAnswersMap");
        if (storedAnswers) {
            try {
                const parsed = JSON.parse(storedAnswers);
                userAnswersMap = new Map(Object.entries(parsed).map(([k,v]) => [Number(k), v]));
            } catch(e) {}
        }
        const storedSubmitted = localStorage.getItem("submittedMap");
        if (storedSubmitted) {
            try {
                const parsedSub = JSON.parse(storedSubmitted);
                submittedMap = new Map(Object.entries(parsedSub).map(([k,v]) => [Number(k), v]));
            } catch(e) {}
        }
    }
    function persistAnswersAndSubmitted() {
        const ansObj = Object.fromEntries(userAnswersMap);
        const subObj = Object.fromEntries(submittedMap);
        localStorage.setItem("userAnswersMap", JSON.stringify(ansObj));
        localStorage.setItem("submittedMap", JSON.stringify(subObj));
        saveWrongToLocal();
        saveFavToLocal();
    }
    // 每次答案/提交变更时保存
    function autoPersist() {
        persistAnswersAndSubmitted();
    }
    // 包装修改map的函数触发保存
    const origSet = userAnswersMap.set;
    userAnswersMap.set = function(k,v) { origSet.call(this, k, v); autoPersist(); return this; };
    const origSubSet = submittedMap.set;
    submittedMap.set = function(k,v) { origSubSet.call(this, k, v); autoPersist(); return this; };
    
    // 初始化
    function init() {
        loadLocalData();
        updateFilteredIndices();
        if (filteredIndices.length > 0) currentPos = 0;
        else currentPos = -1;
        renderCurrentQuestion();
        updateCountersAndLists();
        // 绑定事件
        prevBtn.onclick = prevQuestion;
        nextBtn.onclick = nextQuestion;
        submitBtn.onclick = () => { submitCurrent(); autoPersist(); updateCountersAndLists(); };
        favoriteBtn.onclick = () => { toggleFavorite(); autoPersist(); };
        document.getElementById("resetWrongBtn").onclick = clearWrongOnly;
        document.getElementById("resetFavBtn").onclick = clearFavOnly;
        document.getElementById("resetProgressBtn").onclick = resetAllProgress;
        document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.onclick = () => { switchType(btn.getAttribute("data-type")); };
        });
        // 高亮当前选项卡
        document.querySelectorAll(".tab-btn").forEach(btn => {
            if (btn.getAttribute("data-type") === currentType) btn.classList.add("active");
        });
    }
    init();
</script>
