<!DOCTYPE html>

    <style>
        * {
            margin: 0;
            padding: 0;

            flex-wrap: wrap;
            gap: 24px;
            position: relative;
        }

        .quiz-main {
            flex: 3;
            min-width: 280px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);

            transition: all 0.2s;
        }

        .wrongbook-sidebar {
            flex: 1.2;
            min-width: 260px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            padding: 20px 0 20px 0;
            display: flex;
            flex-direction: column;
            height: fit-content;
            max-height: 85vh;
            position: sticky;
            top: 20px;
        }

        @media (max-width: 780px) {
            .app-container {
                flex-direction: column;
            }
            .wrongbook-sidebar {
                position: static;
                max-height: 400px;
            }
        }

        /* 题目卡片头部 */
        .quiz-header {
            padding: 20px 28px 12px 28px;
            border-bottom: 1px solid #e2e8f0;
            background: #ffffff;

        .progress-badge {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 8px;
        }

        .q-counter {
            background: #eef2ff;
            color: #1e40af;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .mode-switch {
            display: flex;
            gap: 12px;
        }

        .mode-btn {
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .mode-btn.active {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }

        .question-text {
            font-size: 1.35rem;
            font-weight: 600;
            line-height: 1.4;
            margin: 20px 0 16px 0;
            color: #0c4a6e;
        }

            padding: 8px 28px 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .option {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 60px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .option:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
            transform: translateX(3px);
        }

        .option-letter {
            width: 32px;
            height: 32px;
            background: white;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #1e293b;
            border: 1px solid #cbd5e1;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .option.selected {
            background: #dbeafe;
            border-color: #3b82f6;
        }

        .option.selected .option-letter {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }

        .feedback {
            margin: 0 28px 20px 28px;
            padding: 12px 16px;
            border-radius: 24px;
            font-weight: 500;
        }

        .feedback.correct {
            background: #dcfce7;
            color: #166534;
        }

        .feedback.wrong {
            background: #fee2e2;
            color: #991b1b;
        }

        .nav-buttons {
            padding: 12px 28px 28px 28px;
            display: flex;
            justify-content: space-between;
            gap: 14px;
            border-top: 1px solid #eef2ff;
        }

        button {
            background: white;
            border: 1px solid #cbd5e1;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;

            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }

            color: #b91c1c;
            border-color: #fecaca;
        }

            background: #fef2f2;
        }

            background: #f1f5f9;
            transform: translateY(-1px);
        }

            font-weight: 700;
            font-size: 1.25rem;
            padding: 0 20px 12px 20px;
            border-bottom: 2px solid #eef2ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .wrong-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
            padding: 12px 10px;
        }

        .wrong-list li {
            background: #fefce8;
            margin-bottom: 10px;
            padding: 12px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #eab308;
        }

        .wrong-list li:hover {
            background: #fffbeb;
            transform: scale(0.99);
        }

        .wrong-q-preview {
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            max-width: 160px;
        }

        .remove-wrong {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #9ca3af;
            padding: 0 6px;
        }

        .remove-wrong:hover {
            color: #dc2626;
        }

        .empty-wrong {
            text-align: center;
            color: #94a3b8;
            padding: 28px 0;
        }

        .action-group {
            padding: 16px 20px 8px 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .small-btn {
            font-size: 0.75rem;
            padding: 6px 10px;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .save-tip {
            font-size: 0.7rem;
            background: #eef2ff;
            padding: 4px 10px;
            border-radius: 30px;
            color: #2563eb;
        }
    </style>
</head>

    </div>
</div>

    // ---------- 智能解析题库 ----------
    function parseQuestions(text) {
        const lines = text.split(/\r?\n/);
        const questions = [];
        let current = null;
        let inOptions = false;
        let optionMap = {};

        for (let line of lines) {
            line = line.trim();
            if (line.length === 0) continue;

            // 匹配题目序号 (例如 "1. 2.xxxx" 或 "2. 4.xxxx")
            const numMatch = line.match(/^(\d+)\.\s+(.+)/);
            if (numMatch && !line.startsWith('A.') && !line.startsWith('B.') && !line.startsWith('C.') && !line.startsWith('D.')) {
                if (current) {
                    // 完成上一题
                    if (current.options && Object.keys(current.options).length === 4 && current.answer) {
                        questions.push(current);
                    }
                }
                current = {
                    id: questions.length,
                    rawNumber: numMatch[1],
                    text: numMatch[2],
                    options: {},
                    answer: ''
                };
                inOptions = false;
                optionMap = {};
                continue;
            }

            if (!current) continue;

            // 匹配选项行
            const optMatch = line.match(/^([ABCD])\.\s+(.*)/);
            if (optMatch) {
                inOptions = true;
                const letter = optMatch[1];
                const optText = optMatch[2];
                current.options[letter] = optText;
                continue;
            }

            // 匹配正确答案
            const ansMatch = line.match(/正确答案[：:]\s*([ABCD])/);
            if (ansMatch) {
                current.answer = ansMatch[1];
                continue;
            }

            // 如果不在选项收集阶段，且当前行既不是序号也不是选项，附加到题干（有些题干跨行）
            if (!inOptions && !optMatch && !ansMatch) {
                current.text += " " + line;
            } else if (inOptions && !optMatch && !ansMatch) {
                // 选项多行文本，追加到上一个选项
                const letters = Object.keys(current.options);
                if (letters.length > 0) {
                    const lastLetter = letters[letters.length - 1];
                    current.options[lastLetter] += " " + line;
                }
            }
        }
        if (current && current.options && Object.keys(current.options).length === 4 && current.answer) {
            questions.push(current);
        }
        return questions;
    }

    const questionsBank = parseQuestions(rawText);
    console.log("解析题目数量:", questionsBank.length);

    // ---------- 状态管理 ----------
    let currentIndex = 0;            // 当前题目在活跃列表中的索引
    let currentMode = "all";         // 'all' 或 'wrong'
    let wrongSet = new Set();         // 存储错题的原始id (questionsBank的下标)
    let activeQuestionIds = [];       // 当前模式下的题目id列表 (原始id)

    // DOM 元素
    const questionTextDiv = document.getElementById('questionText');
    const optionsContainer = document.getElementById('optionsContainer');
    const feedbackDiv = document.getElementById('feedbackMsg');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const modeAllBtn = document.getElementById('modeAllBtn');
    const modeWrongBtn = document.getElementById('modeWrongBtn');
    const clearWrongBtn = document.getElementById('clearWrongBtn');
    const removeCurrentWrongBtn = document.getElementById('removeCurrentWrongBtn');
    const wrongListContainer = document.getElementById('wrongListContainer');
    const wrongCountBadge = document.getElementById('wrongCountBadge');
    const questionCounterSpan = document.getElementById('questionCounter');
    const resetWrongFromSidebar = document.getElementById('resetWrongFromSidebar');
    const saveStatusTip = document.getElementById('saveStatusTip');

    // ---------- 本地存储读写 (错题本 + 进度) ----------
    function saveAllState() {
        // 保存错题本
        localStorage.setItem('wrong_set', JSON.stringify([...wrongSet]));
        // 保存当前模式、当前活跃列表中的索引 (注意：currentMode + currentIndex + activeQuestionIds)
        // 为了稳妥，保存当前模式的标识 + 当前索引，下次恢复时根据模式重建列表再恢复索引位置
        const state = {
            mode: currentMode,
            index: currentIndex,
            // 额外保存当前活跃列表映射的原始id？恢复时可以根据模式重新生成列表，再用原索引，但要确保题目数量未变
            // 由于题库不变，直接保存mode和index即可
        };
        localStorage.setItem('quiz_state', JSON.stringify(state));
        if (saveStatusTip) {
            saveStatusTip.innerHTML = '💾 已自动记忆进度';
            setTimeout(() => {
                if(saveStatusTip) saveStatusTip.innerHTML = '💾 自动记忆进度';
            }, 1500);
        }
    }

    function loadAllState() {
        // 加载错题本
        const storedWrong = localStorage.getItem('wrong_set');
        if (storedWrong) {
            try {
                const arr = JSON.parse(storedWrong);
                wrongSet = new Set(arr);
            } catch(e) {}
        }
        // 加载进度
        const storedState = localStorage.getItem('quiz_state');
        if (storedState) {
            try {
                const state = JSON.parse(storedState);
                if (state.mode === 'all' || state.mode === 'wrong') {
                    currentMode = state.mode;
                }
                if (typeof state.index === 'number') {
                    currentIndex = state.index;
                }
            } catch(e) {}
        }
        // 先更新UI错题本显示
        updateWrongUI();
        // 应用模式
        setModeActive(currentMode);
        // 注意: setModeActive内部调用 rebuildActiveList -> renderCurrentQuestion
        // 但由于currentIndex可能超出范围，需要在rebuild后校正
    }

    // 保存的时机: 切换模式、切换题目、修改错题本(增删)
    function persistAndRender() {
        saveAllState();
    }

    // 辅助函数
    function updateWrongUI() {
        const count = wrongSet.size;
        wrongCountBadge.innerText = count;
        // 刷新错题本列表
        if (count === 0) {
            wrongListContainer.innerHTML = '<li class="empty-wrong">✨ 暂无错题，继续练习～</li>';
        } else {
            let html = '';
            for (let qid of wrongSet) {
                const q = questionsBank[qid];
                if (!q) continue;
                let shortText = q.text.length > 45 ? q.text.substring(0, 42) + '...' : q.text;
                html += `<li data-qid="${qid}">
                            <span class="wrong-q-preview" title="${q.text.replace(/"/g, '&quot;')}">❌ ${shortText}</span>
                            <button class="remove-wrong" data-qid="${qid}">🗑️</button>
                         </li>`;
            }
            wrongListContainer.innerHTML = html;
            // 绑定移除事件
            document.querySelectorAll('.remove-wrong').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const qid = parseInt(btn.dataset.qid);
                    wrongSet.delete(qid);
                    updateWrongUI();
                    if (currentMode === 'wrong') rebuildActiveList();
                    else renderCurrentQuestion();
                    persistAndRender();
                });
            });
            // 点击错题跳转
            document.querySelectorAll('#wrongListContainer li').forEach(li => {
                li.addEventListener('click', (e) => {
                    if (e.target.classList.contains('remove-wrong')) return;
                    const qid = parseInt(li.dataset.qid);
                    if (!isNaN(qid)) {
                        if (currentMode !== 'all') {
                            currentMode = 'all';
                            setModeActive('all');
                        } else {
                            // 确保列表重建
                            rebuildActiveList();
                        }
                        const idxInActive = activeQuestionIds.indexOf(qid);
                        if (idxInActive !== -1) {
                            currentIndex = idxInActive;
                            renderCurrentQuestion();
                            persistAndSave();
                        } else {
                            rebuildActiveList();
                            const newIdx = activeQuestionIds.indexOf(qid);
                            if(newIdx !== -1) currentIndex = newIdx;
                            renderCurrentQuestion();
                            persistAndSave();
                        }
                    }
                });
            });
        }
        persistAndRender();
    }
    function persistAndSave() { saveAllState(); }
    function setModeActive(mode) {
        currentMode = mode;
        if (mode === 'all') {
            modeAllBtn.classList.add('active');
            modeWrongBtn.classList.remove('active');
        } else {
            modeWrongBtn.classList.add('active');
            modeAllBtn.classList.remove('active');
        }
        rebuildActiveList();
    }

    function rebuildActiveList() {
        if (currentMode === 'all') {
            activeQuestionIds = questionsBank.map((_, idx) => idx);
        } else {
            activeQuestionIds = Array.from(wrongSet).sort((a,b)=>a-b);
        }
        if (activeQuestionIds.length === 0 && currentMode === 'wrong') {
            if (wrongSet.size === 0) {
                currentMode = 'all';
                setModeActive('all');
                rebuildActiveList();
            } else {
                activeQuestionIds = [];
            }
        }
        // 校正索引
        if (currentIndex >= activeQuestionIds.length && activeQuestionIds.length > 0) currentIndex = activeQuestionIds.length - 1;
        if (currentIndex < 0 && activeQuestionIds.length > 0) currentIndex = 0;
        if (activeQuestionIds.length === 0) currentIndex = 0;
        renderCurrentQuestion();
        persistAndSave();
    }

    function getCurrentQuestion() {
        if (activeQuestionIds.length === 0) return null;
        const realId = activeQuestionIds[currentIndex];
        return questionsBank[realId];
    }

    let selectedOption = null;
    function renderCurrentQuestion() {
        const q = getCurrentQuestion();
        if (!q || activeQuestionIds.length === 0) {
            questionTextDiv.innerText = currentMode === 'wrong' ? "错题本空空，先去刷题吧~" : "题库加载异常";
            optionsContainer.innerHTML = '';
            feedbackDiv.innerHTML = '';
            questionCounterSpan.innerText = `0 / 0`;
            return;
        }
        questionTextDiv.innerText = `${q.rawNumber}. ${q.text}`;
        const total = activeQuestionIds.length;
        const idxShow = currentIndex + 1;
        questionCounterSpan.innerText = `第${idxShow} / ${total}题`;
        let optsHtml = '';
        const letters = ['A', 'B', 'C', 'D'];
        for (let l of letters) {
            const optText = q.options[l] || '';
            optsHtml += `<div class="option" data-letter="${l}">
                            <span class="option-letter">${l}</span>
                            <span>${optText}</span>
                         </div>`;
        }
        optionsContainer.innerHTML = optsHtml;
        feedbackDiv.innerHTML = '';
        selectedOption = null;
        document.querySelectorAll('.option').forEach(optDiv => {
            optDiv.addEventListener('click', () => {
                const letter = optDiv.dataset.letter;
                if (selectedOption === letter) return;
                document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
                optDiv.classList.add('selected');
                selectedOption = letter;
                const currentQ = getCurrentQuestion();
                const isCorrect = (selectedOption === currentQ.answer);
                if (isCorrect) {
                    feedbackDiv.innerHTML = `<span>✅ 回答正确！</span>`;
                    feedbackDiv.className = 'feedback correct';
                } else {
                    feedbackDiv.innerHTML = `<span>❌ 错误！正确答案是 ${currentQ.answer}. ${currentQ.options[currentQ.answer]}</span>`;
                    feedbackDiv.className = 'feedback wrong';
                    const realId = activeQuestionIds[currentIndex];
                    if (!wrongSet.has(realId)) {
                        wrongSet.add(realId);
                        updateWrongUI();
                        if (currentMode === 'wrong') rebuildActiveList();
                        else renderCurrentQuestion(); // 刷新移除按钮状态
                        persistAndSave();
                    }
                }
                updateRemoveBtnState();
            });
        });
        updateRemoveBtnState();
        persistAndSave();
    }

    function updateRemoveBtnState() {
        if (!getCurrentQuestion()) return;
        const realId = activeQuestionIds[currentIndex];
        if (wrongSet.has(realId)) {
            removeCurrentWrongBtn.innerText = '📌 从错题本移除此题';
            removeCurrentWrongBtn.style.opacity = '1';
        } else {
            removeCurrentWrongBtn.innerText = '⭐ 此题不在错题本';
            removeCurrentWrongBtn.style.opacity = '0.7';
        }
    }

    function nextQuestion() {
        if (activeQuestionIds.length === 0) return;
        if (currentIndex + 1 < activeQuestionIds.length) {
            currentIndex++;
            renderCurrentQuestion();
            persistAndSave();
        } else {
            feedbackDiv.innerHTML = '<span>🎉 已经是最后一题啦！</span>';
            setTimeout(() => { if(feedbackDiv.innerHTML.includes('最后一题')) feedbackDiv.innerHTML = ''; }, 1200);
        }
    }

    function prevQuestion() {
        if (activeQuestionIds.length === 0) return;
        if (currentIndex - 1 >= 0) {
            currentIndex--;
            renderCurrentQuestion();
            persistAndSave();
        } else {
            feedbackDiv.innerHTML = '<span>📖 已是第一题</span>';
            setTimeout(() => { if(feedbackDiv.innerHTML.includes('第一题')) feedbackDiv.innerHTML = ''; }, 1000);
        }
    }

    function clearAllWrong() {
        if (confirm('清空所有错题记录？此操作不可撤销。')) {
            wrongSet.clear();
            updateWrongUI();
            if (currentMode === 'wrong') {
                setModeActive('all');
            } else {
                rebuildActiveList();
            }
            renderCurrentQuestion();
            persistAndSave();
        }
    }

    function removeCurrentFromWrong() {
        const realId = activeQuestionIds[currentIndex];
        if (wrongSet.has(realId)) {
            wrongSet.delete(realId);
            updateWrongUI();
            if (currentMode === 'wrong') rebuildActiveList();
            else renderCurrentQuestion();
            updateRemoveBtnState();
            feedbackDiv.innerHTML = '<span>✔ 已从错题本移除</span>';
            setTimeout(() => { if(feedbackDiv.innerHTML.includes('移除')) feedbackDiv.innerHTML = ''; }, 1000);
            persistAndSave();
        } else {
            feedbackDiv.innerHTML = '<span>ℹ️ 本题不在错题本中</span>';
            setTimeout(() => { if(feedbackDiv.innerHTML.includes('错题本')) feedbackDiv.innerHTML = ''; }, 1000);
        }
    }

    // 初始化
    function init() {
        loadAllState();  // 加载错题及进度
        prevBtn.addEventListener('click', prevQuestion);
        nextBtn.addEventListener('click', nextQuestion);
        modeAllBtn.addEventListener('click', () => setModeActive('all'));
        modeWrongBtn.addEventListener('click', () => setModeActive('wrong'));
        clearWrongBtn.addEventListener('click', clearAllWrong);
        removeCurrentWrongBtn.addEventListener('click', removeCurrentFromWrong);
        resetWrongFromSidebar.addEventListener('click', clearAllWrong);
        window.addEventListener('beforeunload', () => { saveAllState(); });
    }

    init();
</script>
